{% extends "base.html" %}
{% block title %}Markdown to PDF - SerbaBisa{% endblock %}
{% block top_title %}Markdown to PDF{% endblock %}

{% block content %}
<div class="client-tool">
    <div class="tool-header">
        <h1>Markdown to PDF</h1>
        <p>{{ _t('desc_md_to_pdf') }}</p>
    </div>

    <div style="display:flex; gap:.8rem; margin-bottom:1rem; flex-wrap:wrap; align-items:center; background: var(--bg); padding: 1.2rem; border-radius: 12px; border: 1px solid var(--border);">
        <div style="display: flex; gap: 1rem; flex-wrap: wrap; flex: 1;">
            <label style="font-size: 0.9rem; font-weight: 600;">{{ _t('label_paper') }}
                <select id="page-size" style="padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border);">
                    <option value="A4" selected>A4</option>
                    <option value="letter">Letter</option>
                    <option value="legal">Legal</option>
                    <option value="A5">A5</option>
                </select>
            </label>
            <label style="font-size: 0.9rem; font-weight: 600;">{{ _t('label_font_size') }}
                <input type="number" id="font-size" value="11" min="8" max="18" style="width:60px; padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border);">
            </label>
            <label style="font-size: 0.9rem; font-weight: 600;">{{ _t('label_filename') }}
                <input type="text" id="file-name" value="dokumen_mufath" style="width:180px; padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border);">
            </label>
        </div>
        
        <div style="display: flex; gap: 0.5rem;">
            <input type="file" id="md-upload" accept=".md,.markdown,.txt" style="display:none" onchange="loadFile(this.files[0])">
            <button type="button" class="btn btn-small" onclick="document.getElementById('md-upload').click()">
                <i class="bi bi-folder2-open"></i> {{ _t('open_file') }}
            </button>
            <button class="btn btn-primary" onclick="convertMD()">
                <i class="bi bi-file-pdf-fill"></i> {{ _t('convert_to_pdf') }}
            </button>
        </div>
    </div>

    <textarea id="md-input" placeholder="# {{ _t('unair_doc_title') }}

{{ _t('write_lecture_notes_here') }}

### {{ _t('supported_features') }}
- {{ _t('auto_list_creation') }}
- {{ _t('formula_writing') }}
- {{ _t('program_code_si') }}
- {{ _t('images_and_links') }}

> {{ _t('enter_text_click_convert_pdf') }}" 
style="min-height:450px; width:100%; font-family: 'Consolas', 'Monaco', monospace; padding: 1.2rem; border-radius: 12px; border: 1px solid var(--border); line-height: 1.6; font-size: 1rem;"></textarea>

    <div id="md-status" style="margin-top:1rem; font-size:.9rem; font-weight: 500; min-height: 24px;"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
/**
 * Memuat konten {{ _t('from_of') }} file lokal ke dalam textarea
 */
function loadFile(f) {
    if (!f) return;
    const name = f.name.replace(/\.[^.]+$/, "");
    document.getElementById("file-name").value = name;
    
    const reader = new FileReader();
    const status = document.getElementById("md-status");
    
    reader.onload = e => { 
        document.getElementById("md-input").value = e.target.result; 
        status.innerHTML = `<span style="color:var(--primary)"><i class="bi bi-info-circle"></i> File "${f.name}" ber{{ _t('result') }} dimuat.</span>`;
    };
    
    reader.onerror = () => {
        status.innerHTML = `<span style="color:var(--danger)">{{ _t('failed_read_file') }}</span>`;
    };
    
    reader.readAsText(f);
}

/**
 * Mengirim data ke backend untuk dikonversi menjadi PDF
 */
async function convertMD() {
    const md = document.getElementById("md-input").value;
    const status = document.getElementById("md-status");
    const fileNameInput = document.getElementById("file-name").value || "dokumen";

    if (!md.trim()) { 
        status.innerHTML = `<span style="color:var(--danger)">{{ _t('content_empty') }}</span>`; 
        return; 
    }

    const fd = new FormData();
    fd.append("markdown", md);
    fd.append("page_size", document.getElementById("page-size").value);
    fd.append("font_size", document.getElementById("font-size").value);
    fd.append("file_name", fileNameInput);

    status.innerHTML = `<span style="color:var(--primary)"><i class="bi bi-hourglass-split"></i> {{ _t('crafting_pdf') }}</span>`;
    
    try {
        const response = await fetch("/convert/md-to-pdf", { 
            method: "POST", 
            body: fd 
        });
        
        if (!response.ok) {
            const data = await response.json().catch(() => ({}));
            throw new Error(data.error || "Gagal melakukan konversi.");
        }
        
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        
        link.href = url;
        link.download = fileNameInput + ".pdf";
        document.body.appendChild(link); 
        link.click(); 
        link.remove();
        
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        status.innerHTML = `<span style="color:var(--success)"><i class="bi bi-check-circle"></i> {{ _t('success_pdf_ready') }}</span>`;
        
    } catch (error) {
        status.innerHTML = `<span style="color:var(--danger)"><i class="bi bi-exclamation-triangle"></i> Terjadi kesalahan: ${error.message}</span>`;
    }
}
</script>
{% endblock %}
