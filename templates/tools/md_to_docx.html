{% block scripts %}
<script>
/**
 * Memasukkan konten {{ _t('from_of') }} file .md yang dipilih ke editor
 */
function loadFile(f) {
    if (!f) return;
    const nameWithoutExt = f.name.replace(/\.[^.]+$/, "");
    document.getElementById("file-name").value = nameWithoutExt;
    
    const reader = new FileReader();
    const status = document.getElementById("md-status");
    
    reader.onload = e => { 
        document.getElementById("md-input").value = e.target.result; 
        status.innerHTML = `<span style="color:var(--primary)"><i class="bi bi-check2-circle"></i> Ber{{ _t('result') }} memuat "${f.name}"</span>`;
    };
    
    reader.onerror = () => {
        status.innerHTML = `<span style="color:var(--danger)">{{ _t('failed_read_local_file') }}</span>`;
    };
    
    reader.readAsText(f);
}

/**
 * Mengirim konten Markdown ke backend Flask untuk dijadikan DOCX
 */
async function convertMD() {
    const mdContent = document.getElementById("md-input").value;
    const statusDisplay = document.getElementById("md-status");
    const fileName = document.getElementById("file-name").value || "dokumen";

    if (!mdContent.trim()) { 
        statusDisplay.innerHTML = `<span style="color:var(--danger)"><i class="bi bi-exclamation-triangle"></i> {{ _t('fill_markdown_first') }}</span>`; 
        return; 
    }

    const formData = new FormData();
    formData.append("markdown", mdContent);
    formData.append("file_name", fileName);

    statusDisplay.innerHTML = `<span style="color:var(--primary)"><i class="bi bi-hourglass-split"></i> {{ _t('processing_docx') }}</span>`;
    
    try {
        const response = await fetch("/convert/md-to-docx", { 
            method: "POST", 
            body: formData 
        });
        
        if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            throw new Error(errorData.error || "Gagal menghubungi server konversi.");
        }
        
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        
        link.href = url;
        link.download = fileName + ".docx";
        document.body.appendChild(link); 
        link.click(); 
        link.remove();
        
        setTimeout(() => URL.revokeObjectURL(url), 2000);
        statusDisplay.innerHTML = `<span style="color:var(--success)"><i class="bi bi-check-circle-fill"></i> Ber{{ _t('result') }}! File "${fileName}.docx" telah diunduh.</span>`;
        
    } catch (err) {
        statusDisplay.innerHTML = `<span style="color:var(--danger)"><i class="bi bi-x-octagon-fill"></i> {{ _t('to') }}salahan: ${err.message}</span>`;
    }
}
</script>
