{% extends "base.html" %}
{% block title %}Base64 Encode/Decode - SerbaBisa{% endblock %}
{% block top_title %}Base64{% endblock %}

{% block content %}
<div class="client-tool">
    <div class="tool-header">
        <h1>Base64 Encode / Decode</h1>
        <p>{{ _t('desc_base64') }}</p>
    </div>
    <div class="split-pane">
        <div class="pane">
            <div class="pane-header">
                <span>Teks Biasa</span>
                <button class="btn btn-small" onclick="encodeB64()">{{ _t('encode_arrow') }}</button>
            </div>
            <div class="pane-body">
                <textarea id="b64-text" placeholder="{{ _t('enter_text_to_encode') }}"></textarea>
            </div>
        </div>
        <div class="pane">
            <div class="pane-header">
                <button class="btn btn-small" onclick="decodeB64()">{{ _t('decode_arrow') }}</button>
                <span>Base64</span>
                <button class="btn btn-small" onclick="navigator.clipboard.writeText(document.getElementById('b64-encoded').value)" title="{{ _t('copy') }}"><i class="bi bi-clipboard"></i></button>
            </div>
            <div class="pane-body">
                <textarea id="b64-encoded" placeholder="{{ _t('enter_base64_to_decode') }}"></textarea>
            </div>
        </div>
    </div>
    <div id="b64-status" style="margin-top:.5rem;font-size:.85rem"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
function encodeB64() {
    const text = document.getElementById("b64-text").value;
    if (!text) return;
    try {
        document.getElementById("b64-encoded").value = btoa(unescape(encodeURIComponent(text)));
        document.getElementById("b64-status").innerHTML = '<span style="color:var(--success)"><i class="bi bi-check-circle"></i> {{ _t('successfully_encoded') }}</span>';
    } catch (e) {
        document.getElementById("b64-status").innerHTML = `<span style="color:var(--danger)"><i class="bi bi-x-circle"></i> Galat: ${e.message}</span>`;
    }
}

function decodeB64() {
    const encoded = document.getElementById("b64-encoded").value;
    if (!encoded) return;
    try {
        document.getElementById("b64-text").value = decodeURIComponent(escape(atob(encoded)));
        document.getElementById("b64-status").innerHTML = '<span style="color:var(--success)"><i class="bi bi-check-circle"></i> {{ _t('successfully_decoded') }}</span>';
    } catch (e) {
        document.getElementById("b64-status").innerHTML = `<span style="color:var(--danger)"><i class="bi bi-x-circle"></i> {{ _t('format') }} Base64 tidak valid</span>`;
    }
}
</script>
{% endblock %}
