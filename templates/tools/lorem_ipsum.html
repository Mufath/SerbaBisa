{% extends "base.html" %}
{% block title %}Lorem Ipsum Generator - SerbaBisa{% endblock %}
{% block top_title %}Lorem Ipsum{% endblock %}

{% block content %}
<div class="client-tool">
    <div class="tool-header">
        <h1>Lorem Ipsum Generator</h1>
        <p>{{ _t('desc_lorem_ipsum') }}</p>
    </div>

    <div style="display:flex; gap:.8rem; align-items:flex-end; margin-bottom:1.5rem; flex-wrap:wrap; background: var(--bg); padding: 1.2rem; border-radius: 12px; border: 1px solid var(--border);">
        <div class="form-group" style="margin-bottom:0">
            <label style="font-weight: 600; font-size: 0.9rem;">{{ _t('amount') }}</label>
            <input type="number" id="li-count" value="3" min="1" max="100" style="width:80px; padding: 6px; border-radius: 6px; border: 1px solid var(--border);" oninput="generate()">
        </div>
        
        <div class="form-group" style="margin-bottom:0">
            <label style="font-weight: 600; font-size: 0.9rem;">Tipe</label>
            <select id="li-type" onchange="generate()" style="padding: 6px; border-radius: 6px; border: 1px solid var(--border); background: white;">
                <option value="paragraphs">{{ _t('paragraphs') }}</option>
                <option value="sentences">{{ _t('sentences') }}</option>
                <option value="words">{{ _t('words') }}</option>
            </select>
        </div>

        <label class="checkbox-label" style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; margin-bottom: 0.4rem; font-size: 0.9rem;">
            <input type="checkbox" id="li-start" checked onchange="generate()">
            <span>{{ _t('start') }} dengan "Lorem ipsum..."</span>
        </label>

        <button class="btn btn-primary" onclick="generate()" style="margin-left: auto;">
            <i class="bi bi-arrow-clockwise"></i> Acak Ulang
        </button>
    </div>

    <div class="pane" style="border: 1px solid var(--border); border-radius: 12px; overflow: hidden;">
        <div class="pane-header" style="background: var(--bg); padding: 10px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: 600;"><i class="bi bi-text-paragraph"></i> Teks Ber{{ _t('result') }} Dibuat</span>
            <button class="btn btn-small" onclick="copyResult()">
                <i class="bi bi-clipboard"></i> {{ _t('copy') }} Teks
            </button>
        </div>
        <div class="pane-body" style="background: white; padding: 1.5rem;">
            <div id="li-output" style="white-space:pre-wrap; line-height:1.8; font-size:1rem; color: #333; min-height:200px;"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
/**
 * Data Teks Standar
 */
const LOREM = "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.";

const WORDS = "a ac accumsan adipiscing aenean aliquam aliquet amet ante aptent arcu at auctor augue bibendum blandit class commodo condimentum congue consectetur consequat conubia convallis cras cubilia cum curabitur cursus dapibus diam dictum dictumst dignissim dis dolor donec dui duis egestas eget eleifend elementum elit enim erat eros est et etiam eu euismod facilisi facilisis fames faucibus felis fermentum feugiat fringilla fusce gravida habitant habitasse hac hendrerit himenaeos iaculis id imperdiet in inceptos integer interdum ipsum justo lacinia lacus laoreet lectus leo libero ligula litora lobortis lorem luctus maecenas magna magnis malesuada massa mas-sa mattis mauris metus mi molestie mollis montes morbi mus nam nascetur natoque nec neque netus nibh nisi nisl non nostra nulla nullam nunc odio orci ornare parturient pellentesque penatibus per pharetra phasellus placerat platea porta porttitor posuere potenti praesent pretium primis proin pulvinar purus quam quis quisque rhoncus ridiculus risus rutrum sagittis sapien scelerisque sed sem semper senectus sit sociis sociosqu sodales sollicitudin suscipit suspendisse taciti tellus tempor tempus tincidunt torquent tortor tristique turpis ullamcorper ultrices ultricies urna ut varius vehicula vel velit venenatis vestibulum vitae vivamus viverra volutpat vulputate".split(" ");

/**
 * Membuat {{ _t('sentences') }} Acak
 */
function randomSentence(minWords, maxWords) {
    const len = minWords + Math.floor(Math.random() * (maxWords - minWords));
    const words = [];
    for (let i = 0; i < len; i++) {
        words.push(WORDS[Math.floor(Math.random() * WORDS.length)]);
    }
    // Kapitalisasi huruf pertama
    words[0] = words[0][0].toUpperCase() + words[0].slice(1);
    return words.join(" ") + ".";
}

/**
 * Membuat {{ _t('paragraphs') }} Acak
 */
function randomParagraph() {
    const sentenceCount = 4 + Math.floor(Math.random() * 5);
    const sentences = [];
    for (let i = 0; i < sentenceCount; i++) {
        sentences.push(randomSentence(6, 16));
    }
    return sentences.join(" ");
}

/**
 * Fungsi Utama Generator
 */
function generate() {
    const countInput = document.getElementById("li-count");
    let count = parseInt(countInput.value);
    
    // Validasi batas
    if (isNaN(count) || count < 1) count = 1;
    if (count > 100) count = 100;

    const type = document.getElementById("li-type").value;
    const startLorem = document.getElementById("li-start").checked;
    let result = "";

    if (type === "paragraphs") {
        const paras = [];
        for (let i = 0; i < count; i++) {
            paras.push(randomParagraph());
        }
        if (startLorem) {
            paras[0] = LOREM + " " + paras[0];
        }
        result = paras.join("\n\n");
    } 
    else if (type === "sentences") {
        const sents = [];
        for (let i = 0; i < count; i++) {
            sents.push(randomSentence(6, 16));
        }
        if (startLorem) {
            sents[0] = LOREM.split(". ")[0] + ".";
        }
        result = sents.join(" ");
    } 
    else {
        const words = [];
        if (startLorem) {
            const loremWords = LOREM.replace(/[.,]/g, "").toLowerCase().split(" ");
            for (let i = 0; i < Math.min(count, loremWords.length); i++) {
                words.push(loremWords[i]);
            }
        }
        while (words.length < count) {
            words.push(WORDS[Math.floor(Math.random() * WORDS.length)]);
        }
        result = words.slice(0, count).join(" ");
    }
    
    document.getElementById("li-output").textContent = result;
}

/**
 * Fungsi {{ _t('copy') }} Teks
 */
function copyResult() {
    const text = document.getElementById("li-output").textContent;
    if (!text) return;
    
    navigator.clipboard.writeText(text).then(() => {
        alert("Teks ber{{ _t('result') }} di{{ _t('copy_lower') }} ke clipboard!");
    });
}

// Jalankan saat pertama kali dimuat
document.addEventListener('DOMContentLoaded', generate);
</script>
{% endblock %}
